services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - path: ./backend/.env
        required: false   # keys optional — sim degrades gracefully
    volumes:
      - scene-data:/app/data   # keep downloaded OSM scene across restarts
    environment:
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000

  frontend:
    build:
      context: ./frontend
      args:
        # Browser-side URL of the backend (public address in production)
        NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  scene-data:
